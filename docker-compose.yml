services:
  douban-api:
    image: ghcr.io/dreammis/douban-api-rs:latest
    container_name: douban-api-rs
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 豆瓣 Cookie（可选，获取更完整数据）
      DOUBAN_COOKIE: ""
      # 限流大小（默认 3）
      DOUBAN_API_LIMIT_SIZE: "3"
      # ↓↓↓ 代理设置（不需要代理则留空或删除此行）↓↓↓
      # 支持 http / https / socks5 协议
      # 示例：http://192.168.1.1:7890
      # 示例：socks5://192.168.1.1:1080
      DOUBAN_PROXY: ""
    # 如需从宿主机读取 .env 文件，取消注释下行
    # env_file:
    #   - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
